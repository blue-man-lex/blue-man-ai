<div class="blue-man-quest-config">
    <form autocomplete="off" onsubmit="event.preventDefault();">
        
        <!-- Скрытые поля для FormData -->
        <input type="hidden" name="boardFolderUuid" value="{{folderUuid}}">
        <input type="hidden" name="boardFolderName" value="{{folderName}}">
        
        <div class="config-header">
            <h3>
                <i class="fas fa-clipboard-list"></i> Источник контрактов
            </h3>
            <p>Перетащите сюда папку из вкладки Журналов.</p>
        </div>

        <div class="form-group">
            <div class="quest-drop-zone">
                {{#if folderName}}
                    <div class="folder-info">
                        <i class="fas fa-folder-open"></i> {{folderName}}
                    </div>
                {{else}}
                    <div class="drop-hint">
                        <i class="fas fa-file-import"></i>
                        Перетащите папку сюда
                    </div>
                {{/if}}
            </div>
        </div>

        <button type="button" class="clear-board">
            <i class="fas fa-trash"></i> Отвязать
        </button>
        <button type="submit">
            <i class="fas fa-save"></i> СОХРАНИТЬ
        </button>
    </form>
</div>
