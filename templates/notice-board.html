<div class="notice-board-container">
    <div class="board-header">
        <h2><i class="fas fa-map-signs"></i> {{boardName}}</h2>
        <p>Свежие контракты, просьбы и объявления</p>
    </div>

    {{#if isEmpty}}
        <div class="empty-board">
            <i class="fas fa-wind"></i>
            <p>На доске пока нет новых объявлений...</p>
        </div>
    {{else}}
        <div class="contracts-grid">
            {{#each quests}}
            <div class="contract-paper {{this.rarityClass}}" data-uuid="{{this.id}}" title="Правый клик (ПКМ) - Читать полностью">
                <div class="pin"></div>
                <div class="rank-stamp">{{this.rarityName}}</div>
                
                <div class="contract-content">
                    <h3 class="contract-title">{{this.name}}</h3>
                    
                    {{#if this.image}}
                        <div class="contract-image-wrapper">
                            <img src="{{this.image}}" class="contract-image" alt="Poster">
                        </div>
                    {{/if}}
                    
                    <div class="contract-text {{#if this.image}}has-image{{else}}no-image{{/if}}">{{this.preview}}</div>
                </div>
                
                <div class="contract-footer">
                    <div class="contract-reward">{{this.rewardInfo}}</div>
                    <button class="accept-contract-btn" data-uuid="{{this.id}}">
                        <i class="fas fa-hand-paper"></i> Сорвать
                    </button>
                </div>
            </div>
            {{/each}}
        </div>
    {{/if}}
</div>
